<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Kualitas Air - Umrah</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        body { background-color: #f7f9fc; color: #333; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }

        /* --- HEADER --- */
        .header { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .mascot-header { position: relative; width: 100px; flex-shrink: 0; }
        .mascot-header img { width: 100%; height: auto; display: block; }
        .header-text { text-align: left; }
        .header-text h1 { font-size: 18px; font-weight: 700; color: #2c3e50; margin-bottom: 2px; }
        .header-text p { font-size: 12px; color: #7f8c8d; }

        /* --- STATUS PAKAN & TOMBOL UNDUH --- */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .feed-status-card, .btn-download-trigger { min-height: 82px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .feed-status-card { display: flex; flex-direction: column; justify-content: center; padding: 12px 14px; background: rgba(39, 174, 96, 0.12); border: 1px solid rgba(39, 174, 96, 0.18); color: #1e8449; }
        .feed-status-card.feed-reduce { background: rgba(231, 76, 60, 0.16); border-color: rgba(231, 76, 60, 0.28); color: #c0392b; }
        .feed-label { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .feed-value { font-size: 18px; font-weight: 700; line-height: 1.15; }
        .btn-download-trigger { background-color: #27ae60; color: white; border: none; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; text-align: center; line-height: 1.25; }

        /* --- KARTU DATA --- */
        .card { background-color: #ffffff; border-radius: 20px; padding: 20px; box-shadow: 0 8px 15px rgba(0, 0, 0, 0.03); }
        .summary-list { display: flex; flex-direction: column; gap: 12px; }
        .summary-item { display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 700; color: #4a4a4a; }
        .item-left { display: flex; align-items: center; gap: 12px; }
        .item-icon { font-size: 22px; width: 28px; text-align: center; }

        /* --- GRAFIK --- */
        .chart-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-weight: 700; color: #2c3e50; font-size: 14px; }
        .chart-container { position: relative; height: 180px; width: 100%; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background-color: #fff; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .modal-content h3 { margin-bottom: 10px; color: #2c3e50; }
        .modal-content p { font-size: 13px; color: #7f8c8d; margin-bottom: 20px; }
        .date-input { width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 20px; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; }
        .btn-confirm { flex: 1; background-color: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; }
        .btn-cancel { flex: 1; background-color: #e74c3c; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; }

        /* --- FOOTER --- */
        .footer { text-align: center; margin-top: 10px; padding-bottom: 30px; font-weight: 700; color: #2c3e50; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; }
        .footer img { height: 35px; width: auto; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <div class="mascot-header">
                <img id="mascotImage" src="wake.png" alt="Maskot">
            </div>
            <div class="header-text">
                <h1>Monitor Kualitas Air</h1>
                <p id="last-update">Menunggu data...</p>
            </div>
        </div>

        <div class="action-row">
            <div id="feedStatusCard" class="feed-status-card">
                <div class="feed-label">Status Pakan</div>
                <div id="feedStatusValue" class="feed-value">NORMAL</div>
            </div>

            <button id="btnOpenModal" class="btn-download-trigger">
                <span>📊</span>
                <span>Unduh Laporan Harian</span>
            </button>
        </div>

        <div class="card">
            <div class="summary-list">
                <div class="summary-item"><div class="item-left"><span class="item-icon">🌡️</span><span>Suhu</span></div><span id="val-suhu">-- °C</span></div>
                <div class="summary-item"><div class="item-left"><span class="item-icon">💧</span><span>pH</span></div><span id="val-ph">--</span></div>
                <div class="summary-item"><div class="item-left"><span class="item-icon">🧂</span><span>Salinitas</span></div><span id="val-salinitas">-- g/L</span></div>
                <div class="summary-item"><div class="item-left"><span class="item-icon">🟤</span><span>Kekeruhan</span></div><span id="val-kekeruhan">-- NTU</span></div>
            </div>
        </div>

        <div class="card"><div class="chart-header">🌡️ Suhu (°C)</div><div class="chart-container"><canvas id="chartSuhu"></canvas></div></div>
        <div class="card"><div class="chart-header">💧 pH</div><div class="chart-container"><canvas id="chartPH"></canvas></div></div>
        <div class="card"><div class="chart-header">🧂 Salinitas (g/L)</div><div class="chart-container"><canvas id="chartSalinitas"></canvas></div></div>
        <div class="card"><div class="chart-header">🟤 Kekeruhan (NTU)</div><div class="chart-container"><canvas id="chartKekeruhan"></canvas></div></div>

        <div class="footer">
            <img src="Umrah.PNG" alt="Umrah">
            <span>Universitas Maritim Raja Ali Haji</span>
        </div>

    </div>

    <div id="downloadModal" class="modal">
        <div class="modal-content">
            <h3>Pilih Tanggal Laporan</h3>
            <p>Data hari ini baru akan tersedia untuk diunduh besok jam 00:00.</p>
            <input type="date" id="datePicker" class="date-input">
            <div class="btn-group">
                <button id="btnCancel" class="btn-cancel">Batal</button>
                <button id="btnConfirmDownload" class="btn-confirm">Unduh CSV</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfZtWCnZtWZAeyqeCKydsHgc_uZ4VciOE",
            authDomain: "kualitas-air-74caa.firebaseapp.com",
            databaseURL: "https://kualitas-air-74caa-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kualitas-air-74caa",
            storageBucket: "kualitas-air-74caa.firebasestorage.app",
            messagingSenderId: "1043958781105",
            appId: "1:1043958781105:web:59c84659c1030381e33e90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- INISIALISASI GRAFIK ---
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false } }, y: { beginAtZero: false } }
        };
        
        function createChart(id, color, label) { 
            return new Chart(document.getElementById(id), { 
                type: 'line', 
                data: { labels: [], datasets: [{ label: label, data: [], borderColor: color, tension: 0.4, pointRadius: 2 }] }, 
                options: commonOptions 
            }); 
        }

        const chartSuhu = createChart('chartSuhu', '#e74c3c', 'Suhu');
        const chartPH = createChart('chartPH', '#9b59b6', 'pH');
        const chartSalinitas = createChart('chartSalinitas', '#16a085', 'Salinitas');
        const chartKekeruhan = createChart('chartKekeruhan', '#e67e22', 'Kekeruhan');

        function isValidValue(value) {
            return value !== undefined && value !== null && value !== "";
        }

        function formatValue(value, suffix = "") {
            return isValidValue(value) ? `${value}${suffix}` : `--${suffix}`;
        }

        function getSuhu(data) {
            return data.suhu ?? data.suhu_air;
        }

        // Fungsi untuk mendorong data ke grafik tunggal
        function pushDataSingle(chart, time, val) {
            if (!isValidValue(val)) return;

            chart.data.labels.push(time); 
            chart.data.datasets[0].data.push(val); 

            if (chart.data.labels.length > 24) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }

            chart.update(); 
        }

        function clearChart(chart) {
            chart.data.labels = [];
            chart.data.datasets[0].data = [];
        }

        function pushHistoryData(chart, time, val) {
            if (!isValidValue(val)) return;
            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(val);
        }

        // --- STATUS PAKAN ---
        function updateStatusPakan(rawStatus) {
            const card = document.getElementById('feedStatusCard');
            const value = document.getElementById('feedStatusValue');
            const status = (rawStatus ?? 'NORMAL').toString().trim().toUpperCase().replace(/_/g, ' ');
            const isKurangiPakan = status.includes('KURANGI');

            value.innerText = isKurangiPakan ? 'KURANGI PAKAN' : 'NORMAL';
            card.classList.toggle('feed-reduce', isKurangiPakan);
        }

        // --- ANIMASI MASKOT ---
        let lastDataTime = Date.now();
        function updateMascot(isActive) {
            const img = document.getElementById('mascotImage');
            if (isActive) { img.src = 'wake.png'; } else { img.src = 'sleep.png'; }
        }

        // ===============================================
        // 1. MENGAMBIL DATA RIWAYAT UNTUK GRAFIK AWAL
        // ===============================================
        const historyRef = query(ref(db, 'keramba/logs'), limitToLast(24));
        get(historyRef).then((snapshot) => {
            if (snapshot.exists()) {
                clearChart(chartSuhu);
                clearChart(chartPH);
                clearChart(chartSalinitas);
                clearChart(chartKekeruhan);

                snapshot.forEach((childSnapshot) => {
                    const val = childSnapshot.val();
                    const jamMenit = val.waktu ? val.waktu.substring(0, 5) : "--:--";

                    pushHistoryData(chartSuhu, jamMenit, getSuhu(val));
                    pushHistoryData(chartPH, jamMenit, val.ph);
                    pushHistoryData(chartSalinitas, jamMenit, val.salinitas);
                    pushHistoryData(chartKekeruhan, jamMenit, val.kekeruhan);
                });
                
                chartSuhu.update();
                chartPH.update();
                chartSalinitas.update();
                chartKekeruhan.update();
            }
        });

        // ===============================================
        // 2. PANTAU DATA REAL-TIME
        // ===============================================
        const sensorRef = ref(db, 'keramba/latest');
        onValue(sensorRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                lastDataTime = Date.now();
                updateMascot(true);

                const suhu = getSuhu(data);
                const statusPakan = data.status_pakan ?? data.statusPakan ?? 'NORMAL';
                updateStatusPakan(statusPakan);
                
                document.getElementById('val-suhu').innerText = formatValue(suhu, " °C");
                document.getElementById('val-ph').innerText = formatValue(data.ph);
                document.getElementById('val-salinitas').innerText = formatValue(data.salinitas, " g/L");
                document.getElementById('val-kekeruhan').innerText = formatValue(data.kekeruhan, " NTU");
                
                const time = data.waktu ? data.waktu.substring(0, 5) : "--:--";
                document.getElementById('last-update').innerText = "Update Terakhir: " + (data.tanggal || "--/--/--") + " " + time;
                
                pushDataSingle(chartSuhu, time, suhu);
                pushDataSingle(chartPH, time, data.ph);
                pushDataSingle(chartSalinitas, time, data.salinitas);
                pushDataSingle(chartKekeruhan, time, data.kekeruhan);
            }
        });

        setInterval(() => { if (Date.now() - lastDataTime > 65000) updateMascot(false); }, 10000);

        // ===============================================
        // 3. FITUR UNDUH LAPORAN HARIAN
        // ===============================================
        const modal = document.getElementById("downloadModal");
        const btnOpen = document.getElementById("btnOpenModal");
        const btnCancel = document.getElementById("btnCancel");
        const btnConfirm = document.getElementById("btnConfirmDownload");
        const datePicker = document.getElementById("datePicker");

        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        datePicker.max = yesterday.toISOString().split('T')[0];

        if (btnOpen) btnOpen.onclick = () => { modal.style.display = "flex"; };
        if (btnCancel) btnCancel.onclick = () => { modal.style.display = "none"; };

        if (btnConfirm) btnConfirm.onclick = () => {
            const selectedDate = datePicker.value; 
            if (!selectedDate) { alert("Silakan pilih tanggal terlebih dahulu!"); return; }

            const dateParts = selectedDate.split('-');
            const targetDateESP32 = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;

            btnConfirm.innerText = "Mencari Data...";
            btnConfirm.disabled = true;

            get(ref(db, 'keramba/logs')).then((snapshot) => {
                if (snapshot.exists()) {
                    let csvContent = "data:text/csv;charset=utf-8,Tanggal,Waktu,Suhu (C),pH,Salinitas (g/L),Kekeruhan (NTU)\n";
                    let dataFound = false;

                    snapshot.forEach((childSnapshot) => {
                        const row = childSnapshot.val();
                        if (row.tanggal === targetDateESP32) {
                            dataFound = true;
                            const suhu = getSuhu(row);
                            csvContent += `${row.tanggal},${row.waktu},${suhu ?? ''},${row.ph ?? ''},${row.salinitas ?? ''},${row.kekeruhan ?? ''}\n`;
                        }
                    });

                    if (dataFound) {
                        const encodedUri = encodeURI(csvContent);
                        const link = document.createElement("a");
                        link.setAttribute("href", encodedUri);
                        link.setAttribute("download", `Laporan_Kualitas_Air_${selectedDate}.csv`);
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        modal.style.display = "none";
                    } else {
                        alert(`Data tanggal ${targetDateESP32} belum tersedia atau alat mati pada hari tersebut.`);
                    }
                } else {
                    alert("Database masih kosong, belum ada rekaman sama sekali.");
                }
            }).catch((error) => {
                alert("Terjadi kesalahan koneksi internet.");
                console.error(error);
            }).finally(() => {
                btnConfirm.innerText = "Unduh CSV";
                btnConfirm.disabled = false;
            });
        };
    </script>
</body>
</html>
